function renderIntro(){phaseIndex=-1;renderBPF();const el=document.getElementById('screen-container');el.innerHTML=`<section id="intro-screen"><div class="intro-logo">${document.querySelector('.brand-logo').outerHTML}</div><h1 class="intro-title">${c().introTitle}</h1><p class="intro-body">${c().introBody}</p><div class="intro-grid">${c().introItems.map(x=>`<div class="intro-item">${x}</div>`).join('')}</div><div class="intro-actions"><button class="btn btn-primary" onclick="startPassport()">${c().start}</button><button class="btn btn-ghost" onclick="document.getElementById('json-file').click()">${c().import}</button></div><div class="privacy-note">🔒 ${c().privacy}</div><div class="card" style="max-width:760px;margin:1rem auto 0;text-align:left"><div class="card-copy" style="margin:0">${c().disclaimer}</div></div></section>`}
function startPassport(){phaseIndex=0;maxReached=Math.max(maxReached,0);renderBPF();renderCurrent();afterNav()}
function goPhase(i){if(i<0||i>maxReached||i>7)return;phaseIndex=i;renderBPF();renderCurrent();afterNav()}
function previousPhase(){if(phaseIndex<=0){renderIntro();return}phaseIndex--;renderBPF();renderCurrent();afterNav()}
function nextPhase(){if(phaseIndex<7){phaseIndex++;maxReached=Math.max(maxReached,phaseIndex);renderBPF();renderCurrent();afterNav()}}
function afterNav(){requestAnimationFrame(()=>{window.scrollTo({top:0,behavior:matchMedia('(prefers-reduced-motion: reduce)').matches?'auto':'smooth'});document.querySelector('.section-title')?.focus({preventScroll:true})})}
function updateProgressOnly(){const el=document.querySelector('.nav-progress');if(el)el.textContent=`${sectionCompletion(phaseIndex)}% ${c().completion}`}
function nav(){return`<div class="nav-row"><button class="btn btn-ghost" onclick="previousPhase()">${c().back}</button><div class="nav-progress">${sectionCompletion(phaseIndex)}% ${c().completion}</div><button class="btn btn-primary" onclick="nextPhase()">${phaseIndex===6?c().summary:c().next}</button></div>`}
function sectionHeader(i,note=""){return`<div class="section-intro"><div class="eyebrow">${c().step} ${i+1} ${c().of} 8</div><h1 class="section-title" tabindex="-1">${c().sections[i]}</h1><p class="section-desc">${c().sectionDesc[i]}</p>${note?`<span class="section-note">${note}</span>`:''}</div>`}
function renderCurrent(){if(phaseIndex<0)return renderIntro();const renders=[renderIdentity,renderGovernance,renderKnowledge,renderActions,renderOwnership,renderObservability,renderReviews,renderSummary];renders[phaseIndex]()}

<div class="card"><div class="card-title">${es?'Audiencia, adopción y éxito':'Audience, adoption, and success'}</div><div class="form-grid three">${inputField('identity.audience',es?'Audiencia objetivo':'Target audience','select',{options:'audience',required:true})}${inputField('identity.expectedUsers',es?'Cantidad esperada de usuarios':'Expected user count','number')}${inputField('identity.monthlyVolume',es?'Volumen mensual esperado':'Expected monthly volume','text')}${inputField('identity.geography',es?'Geografías':'Geographies','text')}${inputField('identity.languages',es?'Idiomas y locales':'Languages and locales','text')}${inputField('identity.accessibility',es?'Requisitos de accesibilidad':'Accessibility requirements','text')}${inputField('identity.successCriteria',es?'Criterios de éxito':'Success criteria','textarea',{full:true,required:true})}${inputField('identity.businessKpis',es?'KPIs iniciales':'Initial KPIs','textarea',{full:true,help:es?'Los KPIs operativos detallados se registran más adelante como elementos repetibles.':'Detailed operational KPIs are registered later as repeatable records.'})}</div></div>

function renderGovernance(){const es=lang==='es',g=state.governance,el=document.getElementById('screen-container');el.innerHTML=sectionHeader(1,es?'La zona del libro utiliza exclusivamente Z1, Z2, Z3 y Z3+.':'The book zone uses Z1, Z2, Z3, and Z3+ exclusively.')+`<div class="card"><div class="card-title">${es?'Clasificación de zona':'Zone classification'}</div><div class="card-copy">${es?'La zona Microsoft y la zona del libro son clasificaciones diferentes y se documentan por separado.':'The Microsoft zone and the book zone are separate classifications and are recorded independently.'}</div><div class="form-grid">${inputField('governance.msZone',es?'Governance Zone según Microsoft':'Microsoft Governance Zone','select',{options:[["MS-Z1","MS-Z1 · Citizen Development","MS-Z1 · Citizen Development"],["MS-Z2","MS-Z2 · Partnered Development","MS-Z2 · Partnered Development"],["MS-Z3","MS-Z3 · Professional Development","MS-Z3 · Professional Development"]]})}<div class="field"><label>${es?'Governance Zone según el libro':'Book Governance Zone'} <span class="required-mark">*</span></label><div class="zone-grid">${[['Z1',es?'Productividad individual y bajo riesgo':'Individual productivity and low risk'],['Z2',es?'Equipo o departamento con controles definidos':'Team or department with defined controls'],['Z3',es?'Solución empresarial con gobierno reforzado':'Enterprise solution with enhanced governance'],['Z3+',es?'Alta criticidad, regulación o autonomía':'High criticality, regulation, or autonomy']].map(z=>`<button type="button" class="zone-card ${g.bookZone===z[0]?'selected':''}" onclick="setPath('governance.bookZone','${z[0]}');renderCurrent()"><strong>${z[0]}</strong><span>${z[1]}</span></button>`).join('')}</div></div>${inputField('governance.zoneRationale',es?'Justificación de la clasificación':'Zone assignment rationale','textarea',{full:true,required:true})}${inputField('governance.zoneAssignedBy',es?'Asignada por':'Assigned by')}${inputField('governance.zoneDate',es?' function newSource(){const n=nextNumber(state.knowledgeSources,'KS');return{id:`KS-${String(n).padStart(3,'0')}`,name:"",type:"",location:"",purpose:"",sourceOfTruth:"unknown",sensitivity:"",access:"",grounding:"",lastVerified:"",verifiedBy:"",refresh:"",staleThreshold:"",status:"draft",technicalCustodian:"",limitations:"",owners:[{id:`OWN-${Date.now()}`,name:"",accountability:"Knowledge owner",role:"",contact:""}]}}
function nextNumber(list,prefix){const nums=list.map(x=>parseInt(String(x.id||'').replace(prefix+'-',''),10)).filter(Number.isFinite);return nums.length?Math.max(...nums)+1:1}
function addSource(){state.knowledgeSources.push(newSource());state.meta.modifiedOn=todayISO();renderCurrent();requestAnimationFrame(()=>document.querySelector('.repeater-card:last-of-type')?.scrollIntoView({behavior:'smooth',block:'center'}))}
function updateRecord(collection,id,field,value){const rec=state[collection].find(x=>x.id===id);if(rec)rec[field]=value;state.meta.modifiedOn=todayISO();updateProgressOnly()}
function removeRecord(collection,id){state[collection]=state[collection].filter(x=>x.id!==id);state.meta.modifiedOn=todayISO();renderCurrent()}
function duplicateRecord(collection,id,prefix){const src=state[collection].find(x=>x.id===id);if(!src)return;const copy=JSON.parse(JSON.stringify(src));copy.id=`${prefix}-${String(nextNumber(state[collection],prefix)).padStart(3,'0')}`;if(copy.name)copy.name+=lang==='es'?' (copia)':' (copy)';state[collection].push(copy);renderCurrent()}
function addSourceOwner(sourceId){const s=state.knowledgeSources.find(x=>x.id===sourceId);s?.owners.push({id:`OWN-${Date.now()}-${Math.random().toString(36).slice(2,5)}`,name:"",accountability:"Knowledge owner",role:"",contact:""});renderCurrent()}
function updateSourceOwner(sourceId,ownerId,field,value){const o=state.knowledgeSources.find(x=>x.id===sourceId)?.owners.find(x=>x.id===ownerId);if(o)o[field]=value;state.meta.modifiedOn=todayISO();updateProgressOnly()}
function removeSourceOwner(sourceId,ownerId){const s=state.knowledgeSources.find(x=>x.id===sourceId);if(s&&s.owners.length>1)s.owners=s.owners.filter(x=>x.id!==ownerId);renderCurrent()}
function recordInput(collection,id,field,label,type='text',opts={}){const rec=state[collection].find(x=>x.id===id),value=rec?.[field]??'';let control;if(type==='textarea')control=`<textarea class="textarea-input" oninput="updateRecord('${collection}','${id}','${field}',this.value)">${escapeHtml(value)}</textarea>`;else if(type==='select')control=`<select class="select-input" onchange="updateRecord('${collection}','${id}','${field}',this.value)">${optionsHtml(opts.options,value,opts.blank!==false)}</select>`;else control=`<input class="${type==='date'?'date-input':'text-input'}" type="${type}" value="${attr(value)}" oninput="updateRecord('${collection}','${id}','${field}',this.value)"/>`;return`<div class="field ${opts.full?'full':''}"><label>${label}${opts.required?'<span class="required-mark"> *</span>':''}</label>${control}${opts.help?`<div class="field-help">${opts.help}</div>`:''}</div>`}

/div><div><div class="mini-label">${es?'Contacto':'Contact'}</div><input class="text-input" value="${attr(o.contact)}" placeholder="email / Teams" oninput="updateSourceOwner('${s.id}','${o.id}','contact',this.value)"/></div><button class="btn-icon btn-danger" onclick="removeSourceOwner('${s.id}','${o.id}')">×</button></div>`).join('')}</div>${missing?`<div class="record-warning">${es?'Para activar la fuente completá nombre, ubicación, sensibilidad, verificación y al menos un owner.':'To activate the source, complete name, location, sensitivity, verification, and at least one owner.'}</div>`:''}</article>`}).join('');el.innerHTML=sectionHeader(2,es?'Las fuentes y sus owners se mantienen dentro del mismo registro repetible.':'Sources and their owners remain within the same repeatable record.')+`<div class="repeater-toolbar"><div><div class="card-title">${es?'Registro de fuentes de conocimiento':'Knowledge source register'}</div><div class="repeater-count">${state.knowledgeSources.length} ${es?'fuente(s) registrada(s)':'source(s) registered'}</div></div><button class="btn btn-secondary" onclick="addSource()">+ ${es?'Agregar fuente':'Add source'}</button></div>${sources||`<div class="empty-state">${es?'Todavía no agregaste fuentes. Cada fuente recibirá un ID estable como KS-001.':'No sources have been added. Each source receives a stable ID such as KS-001.'}</div>`}

function updateReview(key,field,value){state.reviews[key][field]=value;state.meta.modifiedOn=todayISO();updateProgressOnly()}
function reviewCard(r){const es=lang==='es',v=state.reviews[r.key],statusClass=['approved'].includes(v.status)?'status-approved':['conditional','inProgress','submitted','expired'].includes(v.status)?'status-warning':v.status==='rejected'?'status-rejected':'';return`<article class="compound-card"><div class="compound-head"><div><div class="compound-title">${r[lang]}</div><div class="compound-meta"><span class="status-dot ${statusClass}"></span>${escapeHtml(c().reviewStatus[v.status])}</div></div><span class="record-id">REV-${r.key.toUpperCase()}</span></div><div class="form-grid three"><div class="field"><label>${es?'¿Requerida?':'Required?'}</label><select class="select-input" onchange="updateReview('${r.key}','required',this.value)">${optionsHtml([["yes",c().yes,c().yes],["no",c().no,c().no],["unknown",c().unknown,c().unknown]],v.required,false)}</select></div><div class="field"><label>${es?'Estado':'Status'}</label><select class="select-input" onchange="updateReview('${r.key}','status',this.value);renderCurrent()">${optionsHtml('reviewStatus',v.status,false)}</select></div><div class="field"><label>Reviewer</label><input class="text-input" value="${attr(v.reviewer)}" oninput="updateReview('${r.key}','reviewer',this.value)"/></div><div class="field"><label>${es?'Rol del reviewer':'Reviewer role'}</label><input class="text-input" value="${attr(v.role)}" oninput="updateReview('${r.key}','role',this.value)"/></div><div class="field"><label>${es?'Fecha de revisión':'Review date'}</label><input class="date-input" type="date" value="${attr(v.reviewDate)}" oninput="updateReview('${r.key}','reviewDate',this.value)"/></div><div class="field"><label>${es?'Válida hasta':'Valid until'}</label><input class="date-input" type="date" value="${attr(v.validUntil)}" oninput="updateReview('${r.key}','validUntil',this.value)"/></div><div class="field"><label>${es?'Próxima revisión':'Next review'}</label><input class="date-input" type="date" value="${attr(v.nextReview)}" oninput="updateReview('${r.key}','nextReview',this.value)"/></div><div class="field full"><label>${es?'Condiciones y remediaciones':'Conditions and remediation'}</label><textarea class="textarea-input" oninput="updateReview('${r.key}','conditions',this.value)">${escapeHtml(v.conditions)}</textarea></div><div class="field full"><label>${es?'Evidencia / enlace':'Evidence / link'}</label><input class="text-input" value="${attr(v.evidence)}" oninput="updateReview('${r.key}','evidence',this.value)"/></div><div class="field full"><label>${es?'Comentarios':'Comments'}</label><textarea class="textarea-input" oninput="updateReview('${r.key}','comments',this.value)">${escapeHtml(v.comments)}</textarea></div></div></article>`}
function renderReviews(){const es=lang==='es',el=document.getElementById('screen-container');el.innerHTML=sectionHeader(6,es?'Cada revisión aparece como una única pregunta compuesta.':'Each review appears as one compound question.')+REVIEW_TYPES.map(reviewCard).join('')+nav()}
function completionData(){const checks=[state.identity.name,state.identity.uniqueId,state.identity.purpose,state.identity.businessProblem,state.identity.useCase,state.identity.outOfScope,state.identity.successCriteria,state.governance.bookZone,state.governance.zoneRationale,state.governance.sensitivity,state.governance.actionLevel,state.governance.autonomy,state.governance.impact,state.ownership.businessOwner,state.ownership.maker,state.ownership.technicalOwner,state.ownership.operationsOwner,state.ownership.escalation,state.lifecycle.stage];let total=checks.length+Math.max(1,state.knowledgeSources.length)*3+Math.max(1,state.actions.length)*2+Math.max(1,state.kpis.length);let done=checks.filter(Boolean).length;done+=state.knowledgeSources.length?state.knowledgeSources.reduce((n,s)=>n+[s.name,s.location,s.owners.some(o=>o.name)].filter(Boolean).length,0):0;done+=state.actions.length?state.actions.reduce((n,a)=>n+[a.name,a.system].filter(Boolean).length,0):0;done+=state.kpis.length?state.kpis.reduce((n,k)=>n+(k.name?1:0),0):0;return{done,total,pct:Math.round(done/total*100)}}
function sectionCompletion(i){const tests=[
 [state.identity.name,state.identity.uniqueId,state.identity.purpose,state.identity.businessProblem,state.identity.useCase,state.identity.outOfScope,state.identity.successCriteria],
 [state.governance.bookZone,state.governance.zoneRationale,state.governance.sensitivity,state.governance.actionLevel,state.governance.autonomy,state.governance.impact],
 [state.knowledgeSources.length,state.knowledgeSources.every(s=>s.name&&s.location&&s.owners.some(o=>o.name))],
 [state.actions.length,state.actions.every(a=>a.name&&a.system),state.integrations.every(d=>d.system)],
 [state.ownership.businessOwner,state.ownership.maker,state.ownership.technicalOwner,state.ownership.operationsOwner,state.ownership.escalation],
 [state.lifecycle.stage,state.observability.monitoringApproach,state.kpis.length],
 [Object.values(state.reviews).some(r=>r.status==='approved'||r.status==='conditional')],
 [1]
 ][i]||[1];return Math.round(tests.filter(Boolean).length/tests.length*100)}
function valueOr(v){return v||c().notProvided}
function labelFrom(set,value){const o=(OPTION_SETS[set]||[]).find(x=>x[0]===value);return o?o[lang==='es'?1:2]:valueOr(value)}
function reviewPill(status){const cls=status==='approved'?'pill-green':['conditional','inProgress','submitted','expired'].includes(status)?'pill-amber':status==='rejected'?'pill-red':'pill-neutral';return`<span class="pill ${cls}">${escapeHtml(c().reviewStatus[status])}</span>`}
function renderSummary(){const es=lang==='es',el=document.getElementById('screen-container'),comp=completionData(),stage=labelFrom('lifecycle',state.lifecycle.stage);const reviewRows=REVIEW_TYPES.map(r=>{const v=state.reviews[r.key];return`<tr><td>${r[lang]}</td><td>${reviewPill(v.status)}</td><td>${escapeHtml(valueOr(v.reviewer))}</td><td>${escapeHtml(valueOr(v.reviewDate))}</td><td>${escapeHtml(valueOr(v.nextReview||v.validUntil))}</td></tr>`}).join('');el.innerHTML=sectionHeader(7)+`<div class="summary-hero"><div class="passport-health">${comp.pct}%</div><div class="health-label">${es?'Completitud del pasaporte':'Passport completeness'}</div><div style="color:var(--muted);font-size:.8rem">${comp.done} ${c().of} ${comp.total} ${es?'controles esenciales':'essential controls'}</div></div><div class="summary-grid"><div class="summary-card summary-wide"><div class="summary-label">${es?'Agente':'Agent'}</div><div class="summary-value">${escapeHtml(valueOr(state.identity.name))}</div><div class="completion-track"><div class="completion-fill" style="width:${comp.pct}%"></div></div></div><div class="summary-card"><div class="summary-label">ID</div><div class="summary-value">${escapeHtml(valueOr(state.identity.uniqueId))}</div></div><div class="summary-card"><div class="summary-label">${es?'Zona del libro':'Book zone'}</div><div class="summary-value">${escapeHtml(valueOr(state.governance.bookZone))}</div></div><div class="summary-card"><div class="summary-label">${es?'Zona Microsoft':'Microsoft zone'}</div><div class="summary-value">${escapeHtml(valueOr(state.governance.msZone))}</div></div><div class="summary-card"><div class="summary-label">${es?'Etapa':'Stage'}</div><div class="summary-value">${escapeHtml(stage)}</div></div><div class="summary-card"><div class="summary-label">${es?'Sensibilidad':'Sensitivity'}</div><div class="summary-value">${escapeHtml(labelFrom('sensitivity',state.governance.sensitivity))}</div></div><div class="summary-card"><div class="summary-label">${es?'Autonomía':'Autonomy'}</div><div class="summary-value">${escapeHtml(labelFrom('autonomy',state.governance.autonomy))}</div></div><div class="summary-card"><div class="summary-label">${es?'Fuentes':'Sources'}</div><div class="summary-value">${state.knowledgeSources.length}</div></div><div class="summary-card"><div class="summary-label">${es?'Acciones':'Actions'}</div><div class="summary-value">${state.actions.length}</div></div><div class="summary-card"><div class="summary-label">KPIs</div><div class="summary-value">${state.kpis.length}</div></div></div><div class="summary-actions"><button class="btn btn-primary" id="pdf-btn" onclick="downloadPdfReport()">▣ <span>${c().downloadPdf}</span></button><button class="btn btn-ghost" onclick="exportJson()">${c().exportJson}</button><button class="btn btn-linkedin" onclick="shareLinkedIn()">in&nbsp; ${c().share}</button><button class="btn btn-danger" onclick="resetPassport()">${c().restart}</button></div><div class="card"><div class="card-title">${es?'Propósito y resultado esperado':'Purpose and expected outcome'}</div><div class="card-copy" style="white-space:pre-wrap">${escapeHtml(valueOr(state.identity.purpose))}</div><div class="card-copy" style="white-space:pre-wrap;margin:0">${escapeHtml(valueOr(state.identity.businessOutcome))}</div></div><div class="card"><div class="card-title">${es?'Revisiones y aprobaciones':'Reviews and approvals'}</div><div style="overflow:auto"><table class="review-table"><thead><tr><th>${es?'Revisión':'Review'}</th><th>${es?'Estado':'Status'}</th><th>Reviewer</th><th>${es?'Fecha':'Date'}</th><th>${es?'Próxima / validez':'Next / valid until'}</th></tr></thead><tbody>${reviewRows}</tbody></table></div></div>${renderBooks()}${renderTools()}<div style="margin-top:1.2rem"><button class="btn btn-ghost" onclick="goPhase(6)">${c().back}</button></div>`}
function renderBooks(){return`<section class="books-cta"><div class="cta-header"><h3 class="cta-title">${c().booksTitle}</h3><p class="cta-copy">${c().booksCopy}</p></div><div class="books-grid">${BOOKS[lang].map(b=>`<article class="book-card"><div class="book-cover-wrap"><img class="book-cover" src="${b.cover}" alt="${escapeHtml(b.title)}" loading="lazy" onerror="this.style.opacity='.15'"/></div><div><div class="book-title">${escapeHtml(b.title)}</div><div class="book-author">Nicolás Andrés Fernández</div><a class="book-link" href="${b.url}" target="_blank" rel="noopener noreferrer">${c().bookLink} ↗</a></div></article>`).join('')}</div></section>`}
function renderTools(){return`<section class="tools-cta"><div class="cta-header"><h3 class="cta-title">${c().toolsTitle}</h3><p class="cta-copy">${c().toolsCopy}</p></div><div class="tools-grid">${TOOLS.map(t=>`<article class="tool-card"><div class="tool-kicker">${escapeHtml(t[lang].kicker)}</div><h4>${escapeHtml(t[lang].title)}</h4><p>${escapeHtml(t[lang].copy)}</p><a class="tool-link" href="${t.url}" target="_blank" rel="noopener noreferrer">${c().openTool} ↗</a></article>`).join('')}</div></section>`}
function exportJson(){const payload={...state,meta:{...state.meta,exportedOn:new Date().toISOString(),language:lang}};downloadBlob(JSON.stringify(payload,null,2),`Agent-Passport-${safeName(state.identity.name||state.identity.uniqueId||'draft')}-${todayISO()}.json`,'application/json');showToast(c().saved)}
function importJsonFile(e){const file=e.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const obj=JSON.parse(reader.result);if(obj?.meta?.schema!=="agent-passport")throw new Error('schema');state=mergeState(initialState(),obj);lang=obj.meta.language==='en'?'en':lang;maxReached=7;phaseIndex=7;setLanguage(lang);showToast(c().imported)}catch(err){showToast(c().invalidJson)}finally{e.target.value=''}};reader.readAsText(file)}
function mergeState(base,src){if(Array.isArray(base))return Array.isArray(src)?src:base;if(base&&typeof base==='object'){Object.keys(base).forEach(k=>{if(src&&k in src)base[k]=mergeState(base[k],src[k])});return base}return src??base}
function downloadBlob(content,name,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},100)}
function safeName(s){return String(s).trim().replace(/[^a-z0-9_-]+/gi,'-').replace(/^-|-$/g,'').slice(0,60)||'draft'}
function resetPassport(){if(!confirm(c().confirmReset))return;state=initialState();maxReached=0;renderIntro();showToast(lang==='es'?'Nuevo pasaporte creado.':'New passport created.')}

async function downloadPdfReport(){const btn=document.getElementById('pdf-btn');if(!window.jspdf?.jsPDF){showToast(c().pdfError);return}btn.disabled=true;btn.querySelector('span').textContent=c().generating;try{const{jsPDF}=window.jspdf,doc=new jsPDF({unit:'mm',format:'a4',compress:true}),W=210,H=297,M=16;const col={indigo:hexRgb('#5552B4'),blue:hexRgb('#3895FF'),teal:hexRgb('#27B8C6'),gold:hexRgb('#FFC000'),magenta:hexRgb('#BD47BD'),red:hexRgb('#EE0055'),ink:hexRgb('#0B0B0F'),surface:hexRgb('#16161D'),muted:hexRgb('#666978'),line:hexRgb('#D9DAE1'),white:[255,255,255]};let page=1,y=20;const txt=x=>doc.setTextColor(...x),fill=x=>doc.setFillColor(...x),draw=x=>doc.setDrawColor(...x),wrap=(t,w)=>doc.splitTextToSize(pdfSafe(t),w);function footer(dark=false){draw(dark?[55,55,65]:col.line);doc.line(M,H-14,W-M,H-14);doc.setFont('helvetica','normal');doc.setFontSize(7);txt(dark?[185,188,198]:col.muted);doc.text(pdfSafe(c().reportFooter),M,H-8);doc.textWithLink('LinkedIn: linkedin.com/in/nfernandezba',W-M-52,H-8,{url:LINKEDIN});doc.text(String(page),W-M,H-8,{align:'right'})}function newPage(){footer();doc.addPage();page++;y=20}function ensure(h){if(y+h>H-20)newPage()}function section(title,accent=col.indigo){ensure(14);fill(accent);doc.roundedRect(M,y-4,3,6,1,1,'F');doc.setFont('helvetica','bold');doc.setFontSize(12);txt(col.ink);doc.text(pdfSafe(title),M+6,y);y+=9}function para(text,size=8.5,color=col.muted,width=W-2*M){doc.setFont('helvetica','normal');doc.setFontSize(size);txt(color);const lines=wrap(text||c().notProvided,width);ensure(lines.length*4.2+5);doc.text(lines,M,y);y+=lines.length*4.2+3}function kv(label,value){ensure(11);doc.setFont('helvetica','bold');doc.setFontSize(7.2);txt(col.indigo);doc.text(pdfSafe(label),M,y);doc.setFont('helvetica','normal');txt(col.ink);const lines=wrap(valueOr(value),W-2*M-50);doc.text(lines,M+50,y);y+=Math.max(6,lines.length*3.8+2)}
fill(col.ink);doc.rect(0,0,W,H,'F');[col.magenta,col.indigo,col.blue,col.teal,col.gold].forEach((x,i)=>{fill(x);doc.rect(i*W/5,0,W/5+.2,4,'F')});doc.setFont('helvetica','bold');doc.setFontSize(10);txt(col.teal);doc.text('COE TOOLKIT',M,33);doc.setFontSize(28);txt(col.white);doc.text('AGENT PASSPORT',M,51);doc.setFontSize(11);txt([180,183,195]);doc.text(pdfSafe(c().reportTitle),M,61);fill(col.surface);doc.roundedRect(M,84,W-2*M,94,5,5,'F');doc.setFontSize(21);txt(col.white);doc.text(wrap(state.identity.name||c().notProvided,W-2*M-24),M+12,105);doc.setFontSize(9);txt(col.teal);doc.text(pdfSafe(`ID: ${valueOr(state.identity.uniqueId)}`),M+12,128);doc.text(pdfSafe(`${lang==='es'?'Zona del libro':'Book zone'}: ${valueOr(state.governance.bookZone)}`),M+12,140);doc.text(pdfSafe(`${lang==='es'?'Etapa':'Stage'}: ${labelFrom('lifecycle',state.lifecycle.stage)}`),M+12,152);doc.setFont('helvetica','normal');doc.setFontSize(8.5);txt([185,188,198]);doc.text(wrap(state.identity.purpose||c().notProvided,W-2*M-24),M+12,166);doc.setFontSize(8);doc.text(`${pdfSafe(lang==='es'?'Generado el':'Generated on')} ${pdfSafe(new Intl.DateTimeFormat(c().locale,{year:'numeric',month:'long',day:'numeric'}).format(new Date()))}`,M,210);doc.setFont('helvetica','bold');txt(col.blue);doc.textWithLink('Nico Fernandez | LinkedIn',M,219,{url:LINKEDIN});doc.setFont('helvetica','normal');txt([175,178,190]);doc.text(wrap(c().disclaimer,W-2*M),M,230);footer(true);
doc.addPage();page++;y=22;section(c().sections[0],col.indigo);kv(lang==='es'?'Nombre':'Name',state.identity.name);kv('ID',state.identity.uniqueId);kv(lang==='es'?'Tipo':'Type',labelFrom('agentType',state.identity.agentType));kv(lang==='es'?'Plataforma':'Platform',labelFrom('platform',state.identity.platform));kv(lang==='es'?'Propósito':'Purpose',state.identity.purpose);kv(lang==='es'?'Problema de negocio':'Business problem',state.identity.businessProblem);kv(lang==='es'?'Resultado esperado':'Expected outcome',state.identity.businessOutcome);kv(lang==='es'?'Caso de uso':'Use case',state.identity.useCase);kv(lang==='es'?'Fuera de alcance':'Out of scope',state.identity.outOfScope);kv(lang==='es'?'Criterios de éxito':'Success criteria',state.identity.successCriteria);

section(c().sections[6],col.magenta);REVIEW_TYPES.forEach(r=>{const v=state.reviews[r.key];kv(r[lang],`${c().reviewStatus[v.status]} | ${v.reviewer||c().notProvided} | ${v.reviewDate||c().notProvided} | ${v.nextReview||v.validUntil||c().notProvided}`)});
newPage();section(c().booksTitle,col.teal);para(c().booksCopy);BOOKS[lang].forEach(b=>{ensure(20);fill(col.surface);doc.roundedRect(M,y-3,W-2*M,17,3,3,'F');doc.setFont('helvetica','bold');doc.setFontSize(8);txt(col.white);doc.text(wrap(b.title,W-2*M-38),M+5,y+2);doc.setFontSize(7);txt(col.blue);doc.textWithLink(pdfSafe(c().bookLink),W-M-30,y+8,{url:b.url});y+=21});section(c().toolsTitle,col.indigo);para(c().toolsCopy);TOOLS.forEach(t=>{ensure(22);doc.setFont('helvetica','bold');doc.setFontSize(8);txt(col.indigo);doc.text(pdfSafe(t[lang].title),M,y);y+=4;doc.setFont('helvetica','normal');doc.setFontSize(7.2);txt(col.muted);doc.text(wrap(t[lang].copy,W-2*M-35),M,y);doc.setTextColor(...col.blue);doc.textWithLink(pdfSafe(c().openTool),W-M-28,y,{url:t.url});y+=13});footer();doc.save(`Agent-Passport-${safeName(state.identity.name||state.identity.uniqueId||'draft')}-${lang}-${todayISO()}.pdf`);showToast(c().saved)}catch(err){console.error(err);showToast(c().pdfError)}finally{btn.disabled=false;btn.querySelector('span').textContent=c().downloadPdf}}
